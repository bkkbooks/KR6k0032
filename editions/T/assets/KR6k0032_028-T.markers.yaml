  - {type: variant, offset: 8237, length: 27, content: 此中諸頌第四句，皆是當時取日＝目【三】【宮】日【大】，目【宋】【元】【明】【宮】日目前事而為，詞句意欲迷人，更無別義, 宋: 此中諸頌第四句皆是當時取日前事而為詞句意欲迷人更無別義, 元: 此中諸頌第四句皆是當時取日前事而為詞句意欲迷人更無別義, 明: 此中諸頌第四句皆是當時取日前事而為詞句意欲迷人更無別義}
