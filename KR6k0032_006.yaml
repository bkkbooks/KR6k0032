body:
  text: 三藏法師義淨奉制譯第一門第九子攝頌曰應為洗足處及以濯足盆熱時須扇聽蚊蟲開五拂緣處同前時諸苾芻隨在何地即便濯足遂使諸蠅在處撩亂時有長者婆羅門等來入寺內見洗足處問言聖者何故此處蟲蠅亂飛答曰此是我等洗足之處彼聞嫌賤沙門釋子皆不清淨隨在何處而濯其足苾芻以緣白佛佛言苾芻不應隨處洗足然洗足處應在寺東南角如佛所言安洗足處者苾芻不知云何應作佛言如龜背形時諸苾芻作已太滑不堪揩足佛言應可澀作此洗足處亦堪洗浴西方諸寺及在處皆有大小無定露地而作或大如床小可半席四畔壘甎高一尺許中間甎砌作龜背形以礓石灰泥水洗不去傍通一竇令水外流濯足洗身最是要用有老苾芻身體羸弱不能往彼洗足之處佛言應畜執事人令其洗足應作洗足瓫是時六衆聞佛聽許便以金銀琉璃作洗足器俗人見問此是何物答言世尊許我作洗足器此即是也彼言聖者仁雖剃髮貪染不除答曰腳踏汝項我畜何過汝非我師何事相責俗生嫌賤苾芻白佛佛言洗足之器不合用寶應以瓦作苾芻便作如馲駝形佛言不合應如象足踏地其中稍高令得支足或可於中作蓮臺形當須澀鞕苾芻用洗足已隨處而安佛言不應如是若是衆物應可覆在隱屏之處若是私物安門扇後緣處同前時屬春陽苾芻患熱身體黃瘦羸劣無堪俗旅見時問言聖者何故身體黃瘦羸劣無力答言時屬春陽我苦於熱彼言聖者何不持扇答言賢首世尊不許答曰仁之大師性懷慈愍若知苦熱許扇無疑苾芻白佛佛言我今聽許苾芻持扇六衆苾芻聞佛聽許便以金銀琉璃或紫礦揩拭及種種莊彩而為扇柄俗旅來見便生譏恥六衆傲慢廣説如前乃至佛言不用寶等而作扇柄應知扇有兩種一以竹作二用葉成時有衆多敬信俗旅便持種種莊彩之扇來施苾芻苾芻不受佛言若為僧伽受取無犯緣在廣嚴城獼猴池側高閣堂中時諸苾芻為蚊蟲所食身體患蛘爬搔不息俗人見時問言聖者何故如是以事具答彼言聖者何故不持拂蚊子物答言世尊不許廣説如前乃至以緣白佛佛言我今聽諸苾芻畜拂蚊子物是時六衆聞佛許已便以衆寶作柄用𤛆牛尾而為其拂俗人既見廣説如前乃至佛言有其五種袪蚊子物一者撚羊毛作二用麻作三用細裂疊布四用故破物五用樹枝梢若用寶物得惡作罪第一門第十子攝頌曰結下裙不高不持於重擔若病許杖絡服蒜等隨聽緣處同前如佛所言苾芻應助營作者有一苾芻須緣梯上時諸上人從下仰觀見彼形露告言聖者我今始知聖者是男由男根具彼在梯上羞愧默然苾芻白佛佛便思念苾芻升梯由不結下裙有如是過告諸苾芻若有營作須升梯者應結下裙方可升上又諸苾芻於營作時高結下裙不信俗流見而譏笑問言聖者欲相撲耶答曰我有作務彼聞默然苾芻白佛佛言若緣梯上當結下裙平地作時不應如是言結下裙者謂捉裙後邊下緣向前腰間急擫也緣處同前六衆苾芻自擎重擔不信者見作如是語我為父母妻子恐不能活是以身擎重擔仁何所為躬自勞苦報言賢首我有多緣一為供養世尊二為僧伽食事三為病者供給所須由是因緣身持重擔彼默無對苾芻白佛佛言苾芻不應身擎重擔作者得越法罪佛在王舍城鷲峯山中有老苾芻登山上下腳跌倒地佛言應畜柱杖聞佛許已六衆即便以金銀等并雜彩物雕飾其杖俗旅見已共生嫌賤苾芻白佛佛言苾芻有二種緣應畜柱杖一謂老瘦無力二謂病苦嬰身時有苾芻佯作老病而柱其杖時諸苾芻以緣白佛佛言若實老病應從僧伽乞畜杖羯磨若僧伽與時應畜如是應乞敷座席鳴楗稚言白既周衆應盡集時老病苾芻於上座前蹲踞合掌作如是白大德僧伽聽我苾芻某甲老朽瘦弱或復身病若無杖時便不能濟今從僧伽乞畜杖羯磨願大德僧伽與我苾芻某甲畜杖羯磨是能愍者願慈愍故如是三説次一苾芻作白羯磨大德僧伽聽此苾芻某甲老朽瘦弱或復身病若無杖時便不能濟今從僧伽乞畜杖羯磨若僧伽時至聽者僧伽應許僧伽今與苾芻某甲老朽瘦弱或復身病作畜杖羯磨白如是羯磨準白應作若僧伽與作畜杖羯磨已柱杖者無犯緣在王舍城時諸苾芻老瘦無力加以風疾於鷲峯山或時上下腳跌倒地澡罐君持悉皆破碎苾芻白佛佛言苾芻應持網絡六衆聞已以五色線而為網絡俗旅譏嫌問答因緣廣如畜杖如若杖絡二皆須者合作羯磨此亦無過既得法已任持非犯緣在室羅伐城時有苾芻食噉蒜已來詣佛所禮佛雙足在一面立佛言苾芻可坐一心聽我説法時彼苾芻聞佛敕已重禮世尊一邊而坐佛為説法彼聽法時數便回面恐有惡氣輕觸尊儀如是再三佛言苾芻汝當一心聽我所説苾芻亦復再三向外回面便禮佛足奉辭而去爾時世尊知而故問阿難陀何故彼苾芻聽我法時數數回面阿難陀言由彼噉蒜恐觸尊儀故數回面佛告阿難陀諸苾芻輩有食蒜耶阿難陀言有佛言由彼食蒜障入聖道向不食蒜者聽我説法以金剛智杵摧壞二十身見大山得預流果是故阿難陀從今以往制諸苾芻不應食蒜及蔥韭類食者得越法罪于時舍利子在衆中坐便作是念今此苾芻不得見諦明當見不即便觀察明亦無緣能見諦理即更深入第四靜慮觀其後際亦不見彼證聖之日即從定起而説頌曰由於少時間散念不專注令彼未來世不見真諦理爾時世尊知舍利子心所念已告言舍利子汝今不應於佛境界而輒思量此乃超過一切聲聞獨覺境界然於未來有佛出世名一切尊此人於彼佛法之中出家修行斷盡諸漏得阿羅漢果佛作是念由彼苾芻食噉蒜故障見真理是故苾芻不應噉蒜食者得越法罪時有苾芻身嬰疾病詣醫人所告言賢首我有如是病幸為處方告言聖者應可服蒜患得銷除報言賢首佛不聽食醫曰此是病藥非餘能差苾芻白佛佛言醫云此藥非餘差者服之無犯苾芻聞已便於寺中為病食蒜受用房舍床榻氈席大小行處及以衆中出入往來或繞制底或禮香臺經過俗人為其説法或時受請詣施主家或至園林天廟之處衆人聚集輒往其中所到之處諸人咸聞蒜臭共生嫌賤作如是語沙門釋子雖復出家而還噉蒜臭氣相熏與我何別苾芻白佛佛言苾芻有病欲食蒜者所有行法我今當説諸病苾芻若食蒜者應住寺側邊房不得用僧臥具及大小行室不得入衆亦不為俗人説法不繞制底不禮香臺不往俗家園林天廟衆人聚處皆不應往可於屏處而噉服之設人見時不生譏恥若服了時於七日內仍住於此服蔥可停三日若韭一日後方洗浴并可洗衣香熏無氣後方入寺如上所制不依行者得越法罪第一門了第二門總攝頌曰牛毛并傘蓋披緂勝鬘緣出家藥湯瓶門扇鎚斤釜第二門第一子攝頌曰牛毛及隱處同床不獨披若得白色衣染覆方應用緣處同前時給孤獨長者以逝多林施四方僧訖令剃髮者往詣寺中剃除鬚髮廣説如前塢波難陀問剃髮人曰汝頗解作牛毛剪不答言是我巧工寧容不解便以鉸刀作牛毛剪髮可留二分此名牛毛剪塢波難陀曰更剪一分如是乃至末後報言汝之癡人未解剪髮宜可淨剃放汝歸家廣説如前乃至佛言苾芻不應作牛毛剪髮作者得越法罪如世尊説不許苾芻作牛毛剪髮苾芻頭上忽有瘡生以刀剃時便受苦痛苾芻白佛佛言可於瘡處以鉸刀剪之餘如常剃緣處同前長者令人為衆剃髮廣如上説塢波難陀見而報曰頗能與我除隱處毛不答言此是我工即令剪剃如前驅使至暮放歸時俗嫌賤佛言苾芻不應剃三處毛剃者得越法罪時有苾芻隱處生瘡或時蟲出痛蛘難忍廢修善事佛言有病緣者應告老宿苾芻然後更互瘡處剃除勿致疑惑緣處同前六衆苾芻同一床臥共相推倚掉舉呵笑苾芻白佛佛作是念共一床眠有如是過同床臥者得越法罪時有衆多苾芻人間遊行至一村落從他借床主人與一報言更須主人報曰我家多人同一床臥如何苾芻各別從索多人共臥理復何傷苾芻答曰世尊不許苾芻白佛佛言若諸苾芻性懷慚恥具修戒行敷襯身物正念在心中以衣袋或以鉢袋隔而方臥床既如是自餘褥席準此應知緣處同前衆多苾芻人間遊行至一村落從長者家求得臥處時屬寒冷復覓臥物時家中人於苾芻處心生哀愍以己臥物借與苾芻先入手者獨披而臥其不得者忍凍終宵以緣白佛佛言不應先得獨臥應可共用隨老者覆後於一時塢波難陀隨老得物便披臥被獨起經行餘者受寒夜遭辛苦小者報曰我受寒苦仁乃經行塢波難陀曰誰遮汝等不起經行彼諸苾芻忍寒經夜苾芻白佛佛言衆人得被臥時通覆必欲經行可披私物若披衆物得惡作罪緣處同前時當冬月苾芻苦寒居在一邊側身而臥時給孤長者來入寺中見諸苾芻一邊而臥問言聖者大師教法務在精勤何故仁等委脅而臥虛度日時不修善品苾芻答曰心有喜樂善品可修我現受寒何能策勵我今被凍誰復能知長者辭出還至宅中以五百張厚白疊帔與送衆僧時諸苾芻即便披出寺外遊行不信俗流見生嫌恥問言聖者豈可仁等並還俗耶答曰汝等不應作如是語我為寒故披此俗衣苾芻白佛佛言不合披俗人衣必有他緣於彼衣上將染色物覆已方披若僧祇衣帔內以物替外將物覆然後方披異斯招罪第二門第二子攝頌曰傘蓋無後世歌聲不放火遊行覓依止毛緂不翻披緣處同前於此城中有一居士常收衣物賣以自活後於異時多獲利物便作是念有何方便得修福業復多獲利此之居士素有信心作如是念我今宜可請佛及僧座敷妙衣設諸飲食衣食供養是大福田緣此施因我多獲利作是念已往詣佛所禮雙足已在一面立白佛言世尊願佛及僧明當就舍受我微供唯願慈悲無違所請爾時世尊默然而受長者知已禮佛而去還至舍中備辦種種上妙飲食盛設妙座敷以上衣即令使者馳往白佛飲食已辦願佛知時于時大衆皆赴彼宅唯佛世尊及知事人留在寺內諸佛世尊有五因緣留知事人為佛取食云何為五一者為欲簡靜離諸喧鬧二者欲為諸天宣説法要三者為欲觀察病人四者為欲觀察臥具五者為欲與諸弟子制其學處今者世尊為制學處諸苾芻衆赴彼請時遂於中途遭天大雨衣服皆濕至彼家中就座而坐隨其坐處衣皆被染居士見已極起嫌心作是思惟我諸衣物並皆失利我今宜可還持此物施與苾芻作是念已告言聖者所坐之物我皆奉施咸可持將苾芻答曰待白世尊未知許不苾芻以緣白佛佛言汝等應知非彼居士本心持施為有譏嫌故不應受時諸苾芻奉佛教已令使往報居士應知佛作是語非彼居士本心持施為有譏嫌故不應受時彼居士聞是語已深起敬心便作是念我此衣物若欲賣者不得半價若諸聖者染令壞色披著受用正是所宜即便持衣詣寺告聖衆曰我本無心欲捨此物今時有意持以奉僧願為我受染以披著唯願仁等當持傘蓋勿令衣濕答言居士待我問佛以緣白佛佛言居士先時無心欲施今時決意持奉衆僧汝等可受染已披著為利前人勿致疑惑是故我今令諸苾芻應持傘蓋若不持者得越法罪六衆苾芻聞許傘蓋便以金等四寶而為其柄及餘種種紫礦畫飾以孔雀尾而作上覆時諸居士婆羅門等見生嫌賤問答同前乃至苾芻白佛佛言苾芻不應持如是傘蓋然有二種蓋一竹二葉六衆苾芻聞佛許蓋遂便長作傘柄在大城中擎之而過俗旅見時作如是語彼持蓋者是何商主大富長者從外方來諸人即便就彼看問既見苾芻共生嫌恥乃至苾芻白佛佛言不應長作傘柄長齊二肘或與蓋等又入聚落時不應持蓋時有苾芻隨逐商旅人間遊行至一聚落道在村內苾芻持蓋不敢入村於村外行遂失商旅獨行在後便被賊劫苾芻白佛佛言若道在村中不得正擎若偏持去者無犯時有苾芻入村乞食以傘柄曾觸不敢持行被雨霑衣苾芻白佛佛言乞食之人淨洗傘柄應可持去必其雨定隨處寄舉欲出村時方可持去緣處同前時有南方遊行外道是盧迦耶黨撥無後世名塢陀夷漸次周旋至室羅伐欲解勞乏入逝多林先往尊者憍陳如處告言苾芻我就師門少學文字欲與仁者略為談説尊者答曰婆羅門激論之事非我所為隨汝別求無宜住此彼即往詣馬勝跋陀羅大名婆澀波名稱晡律拏牛主毗摩羅善臂羅怙羅既至彼已一一告言苾芻我就師門少學文字欲與仁者略為談説時諸尊者答曰婆羅門激論之事非我所為隨汝別求無宜住此次復往至尊者舍利子所還如上問時舍利子即便入定觀察外道有善根不觀見知有繫屬于誰見屬於我更有餘人由聞論議受調伏不觀知更有何時當集於七日內如是知已報言汝求論敵斯為善事可於某處作論議場即於初日尊者舍利子自升高座建立宗門共彼談核每至下時常留餘義如是二三乃至七日於諸方國名稱普聞共知南方有一外道是盧伽耶黨撥無後世名塢陀夷聰明大智漸次遊行至室羅伐與舍利子共立論端經今七日未有勝負無量百千有緣衆生悉皆雲集或發歡喜心或先善根熟尊者舍利子便作是念於我有緣因聽論議而受化者此時皆集是時尊者盡其言義總為衆説時彼外道信解心開合掌起立作如是語大德我於善説法律求欲出家願降慈悲拔濟於我在世尊所勤修梵行時舍利子知其心至即與出家并受近圓如法教授彼便策勵發勇猛心斷盡諸漏得阿羅漢果時彼會中一切大衆見是事已皆生希有咸言尊者舍利子如是聰明高心外道以法摧伏令使出家是時尊者觀彼大衆根機差別樂欲不同順彼宿緣為説法要令其聽者億萬衆生得別證悟或得預流果一來不還或復出家得阿羅漢果或受三歸并五學處所餘大衆皆於三寶深起敬心合掌殷勤奉辭而散時此苾芻以緣白佛佛告諸苾芻非一切處有舍利子其相似者亦不可求是故我今聽諸苾芻學盧迦耶等諸外俗論時諸苾芻聞佛世尊許學書論遂無簡別愚昧之類亦學外書佛言不應愚癡少慧不分明者令學外書自知明慧多聞強識能摧外道者方可學習諸明慧者鎮學外典善品不修佛言不應如是常習外典佛言當作三時每於兩時讀佛經一時習外典苾芻遂於年月分作三時以緣白佛佛言人命迅速剎那無定不應年月分作三時可於一日分為三分苾芻朝習外典暮讀佛經佛言於日初分及以中後可讀佛經待至晚時應披外典苾芻即便暫時尋讀不誦其文尋還廢忘佛言應誦彼皆不知何時應誦佛言如晝三節夜亦三時緣處同前時尊者舍利子與二婆羅門子而為出家一名牛授二號牛主二人悉教讀誦經教後時此二共遊人間至一聚落多獲利養便住此村時彼二人先學婆羅門歌詠聲法由串習故今時讀誦作本音詞時彼一人遇病忽然身死其現存者既溺憂心經多廢忘即便還詣室羅伐城入逝多林既停息已便詣尊者憍陳如所禮敬事畢白言尊者可共溫經答曰善哉我為汝誦既誦少多報言尊者所誦經典文皆謬誤聲韻不長致有所闕答言子我從先來如是習誦即便辭禮更別往詣馬勝跋陀羅大名婆澀波名稱晡律拏牛主毗摩羅善臂羅怙羅既至彼已白言尊者共我溫經答曰善哉我為汝誦既誦少多廣如前説乃至辭禮遂詣尊者舍利子所既禮敬已白言塢波馱耶可共溫經答曰善哉我為汝誦同誦之時長引聲韻其舍利子聲更倍長白言大師自餘尊者誦習皆謬唯獨親教音句無差報言汝愚癡人自為謬誤謗餘智者不善誦經彼諸大德咸非謬誤既被挫折默爾無言時諸苾芻以緣白佛佛作是念苾芻誦經長牽音韻作歌詠聲有如是過由是苾芻不應歌詠引聲而誦經法若苾芻作闡陀聲誦經典者得越法罪若方國言音須引聲者作時無犯言闡陀者謂是婆羅門讀誦之法長引其聲以手指點空而為節段博士先唱諸人隨後
